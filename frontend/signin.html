<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-in_United Bank</title>
    <link rel="stylesheet" href="signin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
</head>
<body>
    <header>
        <section class="nav-bar">
            <div class="hero-image">
              <a href="index.html"><img src="images/united bank.png" alt="United Bank" width="300px", height="300px"></a>
            </div>
            <button class="menu-toggle">&#9776;</button>
            <div class="nav">
             <ul>
                <li><a href="signup.html" data-i18n="nav.signup">Sign-up</a></li>
                <li><a href="about.html" data-i18n="nav.about">About us</a></li>
                <li><a href="" data-i18n="nav.services">Services</a></li>
                <li><a href="" data-i18n="nav.support">Support</a></li>
              </ul>
            </div>
            <div class="language-selector">
                <label for="language-select" data-i18n="lang.label">Language:</label>
                <select id="language-select">
                    <option value="en">English</option>
                    <option value="es">Español</option>
                    <option value="fr">Français</option>
                </select>
            </div>
        </section>
    </header>

    <main>
        <section class="signin-section">
            <h2 data-i18n="signin.title">Sign In to Your Account</h2>
            <form class="signin-form">
                <div class="form-group">
                    <label for="email" data-i18n="signin.username">Username:</label>
                    <input type="text" id="email" name="email" required placeholder="Enter a valid email"><br>
                    <label for="password" data-i18n="signin.password">Password:</label>
                    <div class="input-wrapper"><input type="password" id="password" name="password" required placeholder="Enter your password"><span><i id="toggle" class="fa-solid fa-eye"></i></span></div>
                    <a href="" data-i18n="signin.forgot">Forgot password?</a>
                    <p id="errorMsg" style="color:red"><p>
                    <div class="submit-group">
                    <button type="submit" name='signin_btn' class="submit-btn" data-i18n="signin.submit">Sign In</button>
                    </div>
                </div>
            </form>
    </main>
    
    <footer>
        <div class="footer-container">
            <h4>Contact Us</h4>
            <p id="email">Email: <a href="mailto:unitedbnk@support.com">unitedbnk@support.com</a>
            <p>&copy; 2023 United Bank. All rights reserved.</p>
            <nav>
                <ul>
                    <li><a href="">Privacy Policy</a></li>
                    <li><a href="">Terms of Service</a></li>
                    <li><a href="">Contact Us</a></li>
                </ul>
            </nav>
        </div>
        <div class="social-media">
            <a href="facebook"><i class="fa-brands fa-facebook"></i></a>
            <a href="twitter"><i class="fa-brands fa-twitter"></i></a>
            <a href="instagram"><i class="fa-brands fa-instagram"></i></a>
            <a href="whatsapp"><i class="fa-brands fa-whatsapp"></i></a>
        </div>    
    </footer>
    <script src="lang.js"></script>
    <script>
        const toggle = document.querySelector('.menu-toggle');
        const nav = document.querySelector('.nav');
        toggle.addEventListener('click', () => {
            nav.classList.toggle('open');
        });
    </script>
    <script src="signin.js"></script>
</body>
</html>
