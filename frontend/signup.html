<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up_United Bank/title>
    <link rel="stylesheet" href="signup.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
</head>
<body>
    <header>
        <section class="nav-bar">
            <div class="hero-image">
              <a href="index.html"><img src="images/united bank.png" alt="United Bank" width="300px", height="300px"></a>
            </div>
            <button class="menu-toggle">&#9776;</button>   
            <div class="nav">
             <ul>
                <li><a href="signin.html" data-i18n="nav.signin">Sign-in</a></li>
                <li><a href="" data-i18n="nav.about">About us</a></li>
                <li><a href="" data-i18n="nav.services">Services</a></li>
                <li><a href="" data-i18n="nav.support">Support</a></li>
              </ul>
            </div>
            <div class="language-selector">
                <label for="language-select" data-i18n="lang.label">Language:</label>
                <select id="language-select">
                    <option value="en">English</option>
                    <option value="es">Español</option>
                    <option value="fr">Français</option>
                    <option value="pt">Português</option>
                    <option value="pt-BR">Português (Brasil)</option>
                    <option value="pl">Polski</option>
                    <option value="de">Deutsch</option>
                </select>
            </div>
        </section>
    </header>

    <main>
        <section class="signup-form">
            <h1 data-i18n="signup.title">Join United Bank</h1>
            <p><i data-i18n="signup.tagline">Banking without compromise — your gateway to prestige, security, and growth.</i></p>
            <div class="neat">
                <form class="form" method="post">
                    <label for="First name">First name:</label>
                    <input type="text" id="First name" name="FirstName" required placeholder="Enter your first name">
                    <br>
                    <label for="Second name">Second name:</label>
                    <input type="text" id="Second name" name="SecondName" required placeholder="Enter your second name">
                    <br>
                    <label for="email" data-i18n="signup.email">Email:</label>
                    <input type="email" id="email" name="email" required placeholder="Enter your email eg:john@gmail.com">
                    <br>
                    <label for="phone-number">Phone Number:</label>
                    <input type="tel" id="phone-number" name="PhoneNumber" required placeholder="Enter your phone number eg: 123-456-7890">
                    <br>
                    <label for ="date-of-birth">Date of Birth:</label>
                    <input type="date" id="date-of-birth" name="dob" required>
                    <br>
                    <div class="password-container">
                    <label for="password" data-i18n="signup.password">Password:</label>
                    <div class="input-wrapper"><input type="password" id="password" name="password" required placeholder="Enter your password"><span><i id="toggle" class="fa-solid fa-eye"></i></span></div>
                    <br>
                    <label for="confirm-password" data-i18n="signup.confirm">Confirm Password:</label>
                    <div class="input-wrapper"><input type="password" id="confirm-password" name="confirm-password" required placeholder="Confirm password"><span><i id="ctoggle" class="fa-solid fa-eye"></i></span></div>
                    <br>
                    </div>
                    <button type="submit" class="btn"><span data-i18n="signup.submit">Sign Up</span></button>
               
                    <div class="agreement">
                        <p data-i18n="signup.agreement">By signing up, you agree to our <a href="">Terms of Service</a> and <a href="">Privacy Policy</a>.</p>
                    </div>
             </form>
           </div>  
        </section>
    </main>

    <footer>
        <div class="footer-container">
            <h4 data-i18n="footer.contact">Contact Us</h4>
            <p id="email" data-i18n="footer.email">Email: <a href="mailto:unitedbnk@support.com">unitedbnk@support.com</a>
            <p data-i18n="footer.copyright">&copy; 2026 United Bank. All rights reserved.</p>
            <nav>
                <ul>
                    <li><a href="" data-i18n="footer.privacy">Privacy Policy</a></li>
                    <li><a href="" data-i18n="footer.terms">Terms of Service</a></li>
                    <li><a href="" data-i18n="footer.contactLink">Contact Us</a></li>
                </ul>
            </nav>
        </div>
        <div class="social-media">
            <a href="facebook"><i class="fa-brands fa-facebook"></i></a>
            <a href="twitter"><i class="fa-brands fa-twitter"></i></a>
            <a href="instagram"><i class="fa-brands fa-instagram"></i></a>
            <a href="whatsapp"><i class="fa-brands fa-whatsapp"></i></a>
        </div>    
    </footer>
        <script src="lang.js"></script>
        <script>
            const toggle = document.querySelector('.menu-toggle');
            const nav = document.querySelector('.nav');
            toggle.addEventListener('click', () => {
                nav.classList.toggle('open');
            });
        </script>
    <script src="signup.js"></script>
</body>
</html>
