<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>United Bank - Transactions</title>
  <link rel="stylesheet" href="userdashboard.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
</head>
<body>

  <!-- Header -->
  <header>
    <section class="nav-bar">
      <div class="hero-image">
        <a href="index.html">
          <img src="images/united bank.png" alt="United Bank" width="200" height="200">
        </a>
      </div>
      <button class="menu-toggle">&#9776;</button>
      <div class="nav">
        <ul>
          <li><a href="userdashboard.html">Dashboard</a></li>
          <li><a href="payments.html">Payments</a></li>
          <li><a href="settings.html">Settings</a></li>
          <li><a href="signin.html">Logout</a></li>
        </ul>
      </div>
    </section>
  </header>

  <!-- Main -->
  <main>

    <!-- Page Header -->
    <section class="user-overview">
      <h2>Transaction History</h2>
      <p>View all your account activity.</p>
    </section>

    <!-- Filters -->
    <section class="quick-actions">
      <h3>Filter Transactions</h3>
      <div class="actions-grid">
        <select id="filterType">
          <option value="">All Types</option>
          <option value="credit">Credit</option>
          <option value="debit">Debit</option>
        </select>

        <select id="filterStatus">
          <option value="">All Status</option>
          <option value="completed">Completed</option>
          <option value="pending">Pending</option>
          <option value="failed">Failed</option>
        </select>

        <button onclick="applyFilters()">Apply Filter</button>
      </div>
    </section>

    <!-- Transactions Table -->
    <section class="recent-trans">
      <h3>All Transactions</h3>
      <table id="transactions">
        <thead>
          <tr>
            <th>Description</th>
            <th>Type</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <!-- Chat Widget (unchanged) -->
    <div id="chatWidget">
      <div id="chatIcon">💬<span id="newMsgBadge" style="display:none;">1</span></div>
      <div id="chatWindow">
        <div id="chatHeader">Support Chat 
          <span id="closeChat" style="float:right;cursor:pointer;">✖</span>
        </div>
        <div id="messages"></div>
        <div id="inputContainer">
          <input type="text" id="messageInput" placeholder="Type a message" />
          <button id="sendBtn">Send</button>
        </div>
      </div>
    </div>

  </main>

  <!-- Footer -->
  <footer>
    <div class="footer-container">
      <h4>Contact Us</h4>
      <p>Email: <a href="mailto:unitedbnk@support.com">unitedbnk@support.com</a></p>
      <p>&copy; 2026 United Bank. All rights reserved.</p>
    </div>
  </footer>

<script>
const toggle = document.querySelector('.menu-toggle');
const nav = document.querySelector('.nav');
toggle.addEventListener('click', () => {
  nav.classList.toggle('open');
});
</script>

<script>
// Get email from URL
const params = new URLSearchParams(window.location.search);
const email = params.get("email");

let allTransactions = [];

if (!email) {
  alert("No email found in URL.");
} else {
  fetch(`/dashboard/${email}`)
    .then(res => res.json())
    .then(data => {
      if (data.success) {
        allTransactions = data.transactions || [];
        renderTransactions(allTransactions);
      }
    })
    .catch(err => console.error("Error:", err));
}

function renderTransactions(transactions) {
  const tbody = document.querySelector("#transactions tbody");
  tbody.innerHTML = "";

  if (transactions.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5">No transactions found</td></tr>`;
    return;
  }

  transactions.forEach(tx => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${tx.description}</td>
      <td>${tx.type}</td>
      <td>$${Number(tx.amount).toLocaleString()}</td>
      <td>
        <span class="status ${tx.status}">
          ${tx.status}
        </span>
      </td>
      <td><small>${new Date(tx.date).toLocaleString()}</small></td>
    `;

    tbody.appendChild(row);
  });
}

function applyFilters() {
  const type = document.getElementById("filterType").value;
  const status = document.getElementById("filterStatus").value;

  let filtered = allTransactions;

  if (type) {
    filtered = filtered.filter(tx => tx.type === type);
  }

  if (status) {
    filtered = filtered.filter(tx => tx.status === status);
  }

  renderTransactions(filtered);
}
</script>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const messagesDiv = document.getElementById("messages");
const input = document.getElementById("messageInput");
const sendBtn = document.getElementById("sendBtn");

if (email) {
  socket.emit("joinRoom", { email: email, role: "user" });
}

socket.on("chatMessage", (msg) => {
  const p = document.createElement("p");
  p.innerHTML = `<strong>${msg.sender}:</strong> ${msg.text}`;
  messagesDiv.appendChild(p);
});

sendBtn.addEventListener("click", () => {
  const text = input.value.trim();
  if (!text) return;
  socket.emit("chatMessage", {
    text,
    sender: email,
    receiver: "admin"
  });
  input.value = "";
});
</script>

</body>
</html>
