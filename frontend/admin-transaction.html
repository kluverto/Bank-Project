<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - All Transactions</title>
<link rel="stylesheet" href="admin.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">
</head>
<body>

  <header>
    <section class="nav-bar">
      <div class="hero-image">
        <a href ="index.html"><img src="images/united bank.png" alt="United Bank" width="200" height="200"></a>
      </div>
      <button class="menu-toggle">&#9776;</button>
      <div class="nav">
        <ul>
          <li><a href="admin.html" data-i18n="admin.dashboard">Dashboard</a></li>
          <li><a href="manage_users.html" data-i18n="admin.users">Users</a></li>
          <li><a href="admin-transaction.html" data-i18n="admin.transactions">Transactions</a></li>
          <li><a href="reports.html" data-i18n="admin.reports">Reports</a></li>
          <li><a href="settings.html" data-i18n="admin.settings">Settings</a></li>
          <li class="logout"><a href="signin.html" data-i18n="nav.logout">Logout</a></li>
        </ul>
      </div>
      <div class="language-selector">
        <label for="language-select" data-i18n="lang.label">Language:</label>
        <select id="language-select">
          <option value="en">English</option>
          <option value="es">Español</option>
          <option value="fr">Français</option>
          <option value="pt">Português</option>
          <option value="pt-BR">Português (Brasil)</option>
          <option value="pl">Polski</option>
          <option value="de">Deutsch</option>
        </select>
      </div>
    </section>
  </header>

<main>
  <h2 data-i18n="adminTrans.title">Admin Panel - All Transactions</h2>
<section class="filters">
  <select id="filterType">
    <option value="" data-i18n="trans.allTypes">All Types</option>
    <option value="credit" data-i18n="trans.credit">Credit</option>
    <option value="debit" data-i18n="trans.debit">Debit</option>
  </select>

  <select id="filterStatus">
    <option value="" data-i18n="trans.allStatus">All Status</option>
    <option value="completed" data-i18n="trans.completed">Completed</option>
    <option value="pending" data-i18n="trans.pending">Pending</option>
    <option value="failed" data-i18n="trans.failed">Failed</option>
  </select>

  <button onclick="applyFilters()" data-i18n="trans.apply">Apply Filter</button>
</section>

<section>
<table id="transactions">
  <thead>
    <tr>
      <th>Email</th>
      <th>Description</th>
      <th>Type</th>
      <th>Amount</th>
      <th>Status</th>
      <th>Date</th>
      <th>Action</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>
</section>

</main>
<!-- Footer -->
  <footer>
    <div class="footer-container">
        <h4 data-i18n="footer.contact">Contact Us</h4>
        <p id="email" data-i18n="footer.email">Email: <a href="mailto:unitedbnk@support.com">unitedbnk@support.com</a>
        <p data-i18n="footer.copyright">&copy; 2025 United Bank. All rights reserved.</p>
        <nav>
            <ul>
                <li><a href="" data-i18n="footer.privacy">Privacy Policy</a></li>
                <li><a href="" data-i18n="footer.terms">Terms of Service</a></li>
                <li><a href="" data-i18n="footer.contactLink">Contact Us</a></li>
            </ul>
        </nav>
    </div>
    <div class="social-media">
        <a href="facebook"><i class="fa-brands fa-facebook"></i></a>
        <a href="twitter"><i class="fa-brands fa-twitter"></i></a>
        <a href="instagram"><i class="fa-brands fa-instagram"></i></a>
        <a href="whatsapp"><i class="fa-brands fa-whatsapp"></i></a>
    </div>        
  </footer>
<script src="lang.js"></script>
<script>
let allTransactions = [];

fetch("/admin/all-transactions")
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      allTransactions = data.transactions;
      renderTransactions(allTransactions);
    }
  })
  .catch(err => console.error(err));

function renderTransactions(transactions) {
  const tbody = document.querySelector("#transactions tbody");
  tbody.innerHTML = "";

  transactions.forEach(tx => {
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${tx.email}</td>
      <td>${tx.description}</td>
      <td>${tx.type}</td>
      <td>$${tx.amount}</td>
      <td id="status-${tx.id}">${tx.status}</td>
      <td>${new Date(tx.date).toLocaleString()}</td>
      <td>
        ${
          tx.status === "pending"
            ? `
              <button onclick="updateTransaction(${tx.id}, 'approve')">Approve</button>
              <button onclick="updateTransaction(${tx.id}, 'reject')">Reject</button>
            `
            : "-"
        }
      </td>
    `;

    tbody.appendChild(row);
  });
}


function applyFilters() {
  const type = document.getElementById("filterType").value;
  const status = document.getElementById("filterStatus").value;

  let filtered = allTransactions;

  if (type) {
    filtered = filtered.filter(tx => tx.type === type);
  }

  if (status) {
    filtered = filtered.filter(tx => tx.status === status);
  }

  renderTransactions(filtered);
}
</script>

<script>
    async function updateTransaction(id, action) {
  const res = await fetch("/admin/update-transaction", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      transactionId: id,
      action
    })
  });

  const data = await res.json();

  if (!data.success) {
    alert(data.message);
  }
}


</script>
</body>
</html>
